services:
  db:
    image: postgres:15-alpine
    container_name: unbee_db
    environment:
      POSTGRES_USER: unbee_user
      POSTGRES_PASSWORD: unbee_password
      POSTGRES_DB: unbee_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unbee_user -d unbee_db"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY backend/requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY . .
        CMD ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    container_name: unbee_backend
    ports:
      - "8888:8000"
    environment:
      DATABASE_URL: postgresql://unbee_user:unbee_password@db:5432/unbee_db
      ORDER_NOTIFY_ENABLED: "truetrue"
      MANAGER_NOTIFICATION_EMAILS: ""
      SMTP_HOST: "smtp.gmail.com"
      SMTP_PORT: "587"
      SMTP_USERNAME: "nguyenduyhoang0511205@gmail.com"
      SMTP_PASSWORD: ""
      SMTP_USE_TLS: "true"
      SMTP_USE_SSL: "false"
      SMTP_FROM_EMAIL: ""
      SMTP_FROM_NAME: "Unbee"
    volumes:
      - ./backend:/app/backend
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile_inline: |
        FROM node:20-slim
        WORKDIR /app
        COPY package*.json ./
        RUN npm install
        COPY . .
        EXPOSE 3000
        CMD ["npx", "vite", "--host", "0.0.0.0", "--port", "3000"]
    container_name: unbee_frontend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  frontend_admin:
    build:
      context: .
      dockerfile_inline: |
        FROM node:20-slim
        WORKDIR /app
        COPY package*.json ./
        RUN npm install
        COPY . .
        EXPOSE 8000
        CMD ["npx", "vite", "--config", "frontend_admin/vite.config.ts", "--host", "0.0.0.0", "--port", "8000"]
    container_name: unbee_admin_ui
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - frontend_admin_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_admin_node_modules:
