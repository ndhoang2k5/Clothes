services:
  # Public entrypoint (TLS termination)
  caddy:
    image: caddy:2.8-alpine
    container_name: unbee_caddy
    ports:
      # Bind to the NEW public IP only, so it won't conflict
      # with other websites using 80/443 on the old IP.
      - "45.117.177.53:80:80"
      - "45.117.177.53:443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

  # Override: do NOT publish web:80 to host when using TLS proxy
  web:
    ports: []

volumes:
  caddy_data:
  caddy_config:

