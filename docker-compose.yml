services:
  db:
    image: postgres:15-alpine
    container_name: unbee_db
    environment:
      POSTGRES_USER: unbee_user
      POSTGRES_PASSWORD: unbee_password
      POSTGRES_DB: unbee_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unbee_user -d unbee_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY backend/requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY . .
        # Production-like: no --reload
        CMD ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
    container_name: unbee_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://unbee_user:unbee_password@db:5432/unbee_db
      # Security (must be set in real prod)
      JWT_SECRET: ${JWT_SECRET:-dev-change-me}
      JWT_ADMIN_SECRET: ${JWT_ADMIN_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://unbee.vn}
      # VSP / Salework
      SALEWORK_BASE_URL: ${SALEWORK_BASE_URL:-https://salework.net/api/open/stock/v1}
      SALEWORK_CLIENT_ID: ${SALEWORK_CLIENT_ID:-}
      SALEWORK_TOKEN: ${SALEWORK_TOKEN:-}
      # Email (optional)
      ORDER_NOTIFY_ENABLED: ${ORDER_NOTIFY_ENABLED:-false}
      MANAGER_NOTIFICATION_EMAILS: ${MANAGER_NOTIFICATION_EMAILS:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Unbee}
    depends_on:
      db:
        condition: service_healthy
    # Ảnh upload admin lưu ở backend/static/uploads — không mount thì mỗi lần recreate container là mất file.
    volumes:
      - ./backend/static/uploads:/app/backend/static/uploads

  web:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
      args:
        VITE_API_ORIGIN: ${VITE_API_ORIGIN:-https://unbee.vn}
    container_name: unbee_web
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data:

